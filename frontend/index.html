    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리허설 | AI 모의면접 · 개발자 면접 연습 플랫폼</title>
    <meta name="description" content="리허설은 AI 면접관과 진행하는 개발자 모의면접 플랫폼입니다. 이력서 기반 맞춤 질문, 영상 녹화, 타임스탬프 피드백으로 실전처럼 면접을 연습하세요." />
    <meta name="keywords" content="AI 모의면접, 개발자 모의면접, 리허설, AI 면접, 면접 연습, 백엔드 면접, 프론트엔드 면접, 신입 개발자 면접" />
    <meta name="author" content="리허설" />
    <meta name="application-name" content="리허설" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Google Search Console (dev 빌드에서는 vite 플러그인이 제거) -->
    <meta name="google-site-verification" content="M6N7eSbZzCaQdLSUgBR6iIKrGq-0KJ1e0a2DM5rcmus" />
    <!-- Naver Search Advisor -->
    <meta name="naver-site-verification" content="2c2a8a0075134bde74f8e38270e4715926732476" />

    <!-- Open Graph — 페이지별 title/url/description 은 페이지 컴포넌트의 Helmet 에서 주입 -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="리허설" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter Card — 페이지별 title/description 은 Helmet 주입 -->
    <meta name="twitter:card" content="summary" />

    <!-- 구조화 데이터: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "리허설",
      "alternateName": "Rehearse",
      "url": "%VITE_SITE_URL%/",
      "logo": "%VITE_SITE_URL%/favicon.svg",
      "description": "AI 면접관과 진행하는 개발자 모의면접 플랫폼",
      "inLanguage": "ko-KR"
    }
    </script>

    <!-- 구조화 데이터: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "리허설",
      "alternateName": "Rehearse",
      "url": "%VITE_SITE_URL%/",
      "inLanguage": "ko-KR"
    }
    </script>

    <!-- 구조화 데이터: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "KRW",
        "availability": "https://schema.org/InStock"
      },
      "inLanguage": "ko-KR"
    }
    </script>
