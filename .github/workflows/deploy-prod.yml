name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  # 큐잉 필수: BE/FE 푸시가 빠르게 연달아 들어올 때, 이전 run을 취소하면
  # paths-filter가 직전 커밋과만 비교하기 때문에 취소된 쪽 영역(backend/frontend)
  # 변경이 영구적으로 배포에서 누락된다. 반드시 순차 실행되어야 함.
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
      nginx: ${{ steps.filter.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # push 이벤트에서는 github.event.before(직전 커밋)와 비교.
          # workflow_dispatch 등 before가 없는 이벤트에서는 HEAD~1로 폴백.
          # 이렇게 base를 명시하지 않으면 default branch와 비교하게 되어,
          # default branch가 develop이고 main HEAD가 develop의 ancestor인 상태에서
          # diff가 비어 backend/frontend step이 전부 skip되는 사고가 발생한다.
          base: ${{ github.event.before || 'HEAD~1' }}
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            nginx:
              - 'backend/nginx/**'
            infra:
              - 'backend/docker-compose.prod.yml'
              - 'backend/nginx/**'
              - '.github/workflows/**'
              - 'backend/.env*'

  backend-test:
    name: Backend Test
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

  frontend-build:
    name: Frontend Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    # puppeteer prerender 단계에서 Chromium 280MB 다운로드 회피 — ubuntu-latest 기본 Chrome 사용.
    # npm ci 시점부터 적용되어야 하므로 job-level 로 선언.
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.rehearse.co.kr

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  deploy:
    name: Deploy to Production
    environment: production
    needs: [changes, backend-test, frontend-build]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Frontend: S3 + CloudFront ---
      - name: Download frontend artifact
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy frontend to S3 (assets with long cache)
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        # prerender 로 생성된 하위 디렉토리 index.html 까지 1년 캐시되면 콘텐츠 갱신 시 stale
        # 이슈가 생기므로 모든 index.html 을 sync 에서 제외 후 다음 step 에서 no-cache 업로드.
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --exclude "*/index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Deploy all index.html (no-cache)
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        # root index.html + prerender 결과 모든 하위 디렉토리 index.html 을 no-cache 로 업로드.
        run: |
          cd frontend/dist
          # -print0 | xargs -0 로 공백/특수문자 안전화
          find . -name 'index.html' -type f -print0 | while IFS= read -r -d '' file; do
            key="${file#./}"
            aws s3 cp "$file" "s3://${{ secrets.S3_BUCKET_NAME }}/${key}" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "text/html"
          done

      - name: Invalidate CloudFront cache
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # --- Backend: ECR + EC2 ---
      - name: Login to ECR
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image (prod tags)
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        working-directory: backend
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t ${{ secrets.ECR_REGISTRY }}/rehearse-backend:prod-${{ github.sha }} \
            -t ${{ secrets.ECR_REGISTRY }}/rehearse-backend:prod \
            --push .

      - name: Copy docker-compose.prod.yml and nginx config to EC2
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/docker-compose.prod.yml,backend/nginx/nginx.prod.conf"
          target: "~/rehearse"
          overwrite: true

      - name: Rename compose and nginx files on EC2
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/rehearse/backend
            mv -f docker-compose.prod.yml docker-compose.yml
            mv -f nginx/nginx.prod.conf nginx/nginx.conf

      - name: Deploy backend to EC2
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/rehearse/backend
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker compose --env-file .env stop backend
            docker compose --env-file .env pull backend
            docker compose --env-file .env up -d backend
            echo "Waiting for backend to start..."
            # backend 이미지(eclipse-temurin jre-alpine)에는 curl/wget 미포함 가능.
            # → host에서 컨테이너 IP로 직접 HTTP 요청 (docker exec + curl 의존성 회피)
            BACKEND_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' rehearse-backend)
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf "http://${BACKEND_IP}:8080/actuator/health" > /dev/null 2>&1; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/12: not ready yet..."
            done
            echo "Health check failed after 60s"
            docker compose --env-file .env logs backend --tail 80
            exit 1

      - name: Verify public endpoint
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          for i in $(seq 1 6); do
            if curl -sf https://api.rehearse.co.kr/actuator/health > /dev/null; then
              echo "Public health check passed (attempt $i)"
              exit 0
            fi
            sleep 10
          done
          echo "Public health check failed"
          exit 1

      - name: Restart Nginx on config change
        if: needs.changes.outputs.nginx == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/rehearse/backend
            docker compose restart nginx
