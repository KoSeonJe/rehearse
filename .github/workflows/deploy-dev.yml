name: Deploy to Dev Server

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
      nginx: ${{ steps.filter.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            nginx:
              - 'backend/nginx/**'
            infra:
              - 'backend/docker-compose.yml'
              - 'backend/nginx/**'
              - '.github/workflows/**'
              - 'backend/.env*'

  backend-test:
    name: Backend Test
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

  frontend-build:
    name: Frontend Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api-dev.rehearse.co.kr

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  deploy:
    name: Deploy
    needs: [changes, backend-test, frontend-build]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Frontend: S3 + CloudFront ---
      - name: Download frontend artifact
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy frontend to S3
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        run: aws s3 sync frontend/dist s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # --- Backend: ECR + EC2 ---
      - name: Login to ECR
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        working-directory: backend
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/rehearse-backend:latest .
          docker push ${{ secrets.ECR_REGISTRY }}/rehearse-backend:latest

      - name: Copy docker-compose.yml and nginx config to EC2
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/docker-compose.yml,backend/nginx/nginx.conf"
          target: "~/rehearse"
          overwrite: true

      - name: Deploy backend to EC2
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/rehearse/backend
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker compose --env-file .env stop backend
            docker rmi $(docker images --filter "reference=*/rehearse-backend" -q) 2>/dev/null || true
            docker system prune -af 2>/dev/null || true
            docker compose --env-file .env pull backend
            docker compose --env-file .env up -d backend
            echo "Waiting for backend to start..."
            for i in $(seq 1 12); do
              sleep 5
              if docker exec rehearse-backend curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/12: not ready yet..."
            done
            echo "Health check failed after 60s"
            docker compose --env-file .env logs backend --tail 50
            exit 1

      - name: Restart Nginx on config change
        if: needs.changes.outputs.nginx == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/rehearse/backend
            docker compose restart nginx
