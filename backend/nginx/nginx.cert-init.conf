# === cert-init: certbot 최초 인증서 발급용 80-only 설정 ===
# 사용 시점: ssl_certificate 경로가 아직 존재하지 않을 때 nginx를 기동하기 위한 임시 설정.
# 발급 절차:
#   1. 이 파일을 nginx/nginx.conf 로 복사 후 nginx 기동
#   2. docker compose run --rm certbot certonly --webroot \
#        -w /var/www/certbot \
#        -d api.rehearse.co.kr -d rehearse.co.kr
#   3. 발급 성공 후 nginx.prod.conf 를 nginx/nginx.conf 로 교체
#   4. docker compose restart nginx
server {
    listen 80 default_server;
    server_name rehearse.co.kr api.rehearse.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "Provisioning in progress";
        add_header Content-Type text/plain;
    }
}
