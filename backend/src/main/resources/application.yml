spring:
  application:
    name: rehearse-api
  profiles:
    active: local

  threads:
    virtual:
      enabled: false

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

server:
  port: 8080
  tomcat:
    max-connections: 8192
    accept-count: 100

resilience4j:
  ratelimiter:
    instances:
      openai-api:
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 120s
      claude-api:
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 120s
      whisper-api:
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 120s

app:
  admin:
    password: ${ADMIN_PASSWORD}

openai:
  audio-model: ${OPENAI_AUDIO_MODEL:gpt-4o-mini-audio-preview}

rehearse:
  interview:
    policy:
      standard:
        max-follow-up-rounds: 2
  intent-classifier:
    # 분류기 confidence 가 임계 미만이면 ANSWER 로 fallback (False Negative 안전망)
    fallback-on-low-confidence: 0.7
    # 동일 세션 OFF_TOPIC 연속 발화 N회 도달 시 GIVE_UP escalation
    off-topic-consecutive-limit: 3
  answer-analyzer:
    # plan-02 Step A. 기본 ON, runtime toggle 없음 (Feature Flag 철거 정책)
    enabled: true
  context-engineering:
    l1-caching: true
    l3-compaction-threshold: 5
    l3-recent-window: 5
    l4-just-in-time: true
    max-context-tokens: 8000
  resume-planner:
    model: ${RESUME_PLANNER_MODEL:gpt-4o-mini}
    temperature: 0.3
    max-tokens: 2048
  resume-track:
    model: ${RESUME_TRACK_MODEL:gpt-4o-mini}
    temperature: 0.7
    max-tokens: 800
    playground-max-turns: 3
    chain-max-depth: 4
    wrap-up-threshold-min: 2
    hard-timeout-min: 10

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

