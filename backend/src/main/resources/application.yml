spring:
  application:
    name: rehearse-api
  profiles:
    active: local

  threads:
    virtual:
      enabled: false

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

server:
  port: 8080
  tomcat:
    max-connections: 8192
    accept-count: 100

resilience4j:
  ratelimiter:
    instances:
      openai-api:
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 120s
      claude-api:
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 120s
      whisper-api:
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 120s

app:
  admin:
    password: ${ADMIN_PASSWORD:default-admin-password}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
