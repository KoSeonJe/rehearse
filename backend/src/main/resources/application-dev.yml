spring:
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user,user:email
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email,profile

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

elevenlabs:
  api-key: ${ELEVENLABS_API_KEY:}
  voice-id: ${ELEVENLABS_VOICE_ID:YBRudLRm83BV5Mazcr42}
  model-id: ${ELEVENLABS_MODEL_ID:eleven_multilingual_v2}

claude:
  api-key: ${CLAUDE_API_KEY}
  model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

aws:
  enabled: true
  region: ${AWS_REGION:ap-northeast-2}
  access-key-id: ${AWS_ACCESS_KEY_ID}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY}
  s3:
    bucket: ${AWS_S3_BUCKET:rehearse-videos-dev}

internal:
  api-key: ${INTERNAL_API_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 604800000

app:
  frontend-url: ${FRONTEND_URL:https://dev.rehearse.co.kr}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://dev.rehearse.co.kr}

logging:
  level:
    com.rehearse.api: INFO
    org.flywaydb: INFO

server:
  port: 8080
  forward-headers-strategy: framework

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB
