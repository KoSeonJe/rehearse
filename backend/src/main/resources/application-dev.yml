spring:
  datasource:
    url: jdbc:h2:mem:devlens;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

claude:
  api-key: ${env.CLAUDE_API_KEY:}
  model: claude-sonnet-4-20250514

logging:
  level:
    com.devlens.api: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
