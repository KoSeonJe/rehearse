spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

claude:
  api-key: ${CLAUDE_API_KEY}
  model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://rehearse.app}

logging:
  level:
    com.rehearse.api: INFO
