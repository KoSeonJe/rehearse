spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 3000
      max-lifetime: 1200000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

claude:
  api-key: ${CLAUDE_API_KEY}
  model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}

google:
  tts:
    enabled: ${GOOGLE_TTS_ENABLED:true}
    voice-name: ${GOOGLE_TTS_VOICE_NAME:ko-KR-Chirp3-HD-Schedar}
    language-code: ${GOOGLE_TTS_LANGUAGE_CODE:ko-KR}

aws:
  enabled: true
  region: ${AWS_REGION:ap-northeast-2}
  access-key-id: ${AWS_ACCESS_KEY_ID}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY}
  s3:
    bucket: ${AWS_S3_BUCKET:rehearse-videos-prod}

internal:
  api-key: ${INTERNAL_API_KEY}

app:
  frontend-url: ${FRONTEND_URL:https://rehearse.co.kr}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://rehearse.co.kr}

resilience4j:
  ratelimiter:
    instances:
      openai-api:
        limitForPeriod: 30
        limitRefreshPeriod: 1s
        timeoutDuration: 60s
      claude-api:
        limitForPeriod: 20
        limitRefreshPeriod: 1s
        timeoutDuration: 60s
      whisper-api:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 60s

logging:
  level:
    com.rehearse.api: INFO

server:
  forward-headers-strategy: framework
