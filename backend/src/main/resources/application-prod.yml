spring:
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user,user:email
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email,profile

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 3000
      max-lifetime: 1200000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # baseline-version은 설정하지 말 것.
    # 빈 prod DB에서 baseline-version을 설정하면 V1이 건너뛰어짐.
    # baseline-on-migrate: true는 빈 DB에서 무해(V1부터 시작).

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

claude:
  api-key: ${CLAUDE_API_KEY}
  model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}

google:
  tts:
    enabled: ${GOOGLE_TTS_ENABLED:true}
    voice-name: ${GOOGLE_TTS_VOICE_NAME:ko-KR-Chirp3-HD-Schedar}
    language-code: ${GOOGLE_TTS_LANGUAGE_CODE:ko-KR}

aws:
  enabled: true
  region: ${AWS_REGION:ap-northeast-2}
  # 자격증명은 DefaultCredentialsProvider 체인에 위임 (prod: EC2 Instance Profile/IMDS)
  s3:
    bucket: ${AWS_S3_BUCKET:rehearse-videos-prod}

internal:
  api-key: ${INTERNAL_API_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 604800000

app:
  frontend-url: ${FRONTEND_URL:https://rehearse.co.kr}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://rehearse.co.kr,https://www.rehearse.co.kr}

resilience4j:
  ratelimiter:
    instances:
      openai-api:
        limitForPeriod: 30
        limitRefreshPeriod: 1s
        timeoutDuration: 60s
      claude-api:
        limitForPeriod: 20
        limitRefreshPeriod: 1s
        timeoutDuration: 60s
      whisper-api:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 60s

logging:
  level:
    com.rehearse.api: INFO
    org.flywaydb: INFO

server:
  port: 8080
  forward-headers-strategy: framework
