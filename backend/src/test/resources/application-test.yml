spring:
  datasource:
    url: jdbc:h2:mem:rehearse;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-github-client-id
            client-secret: test-github-client-secret
            scope: read:user,user:email
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: email,profile

claude:
  api-key: test-key
  model: claude-sonnet-4-20250514

aws:
  enabled: false

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tcHJvdmlkZXItdGVzdC1tdXN0LWJlLTI1Ni1iaXRzIQ==
  expiration-ms: 3600000

app:
  frontend-url: http://localhost:5173
  admin:
    password: test-admin-password

cors:
  allowed-origins: http://localhost:5173
